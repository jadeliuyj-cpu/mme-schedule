  { label:"第9周", start:"2026-08-10", end:"2026-08-15" },
  { label:"第10周",start:"2026-08-17", end:"2026-08-22" },
  { label:"第11周",start:"2026-08-24", end:"2026-08-29" },
  { label:"第12周",start:"2026-08-31", end:"2026-09-05" },
];

const DAY_NAMES = ["日","一","二","三","四","五","六"];

function pad(n){ return String(n).padStart(2,"0"); }
function toDateStr(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function getScheduleForDate(dateStr){
  return SCHEDULE.find(s => s.date === dateStr);
}

function renderCard(s, compact){
  if(!s.code) return `<div class="class-card" style="border-left-color:#999;"><div class="class-name" style="color:#666;">${s.name}</div></div>`;
  const cls = s.slot;
  if(compact){
    return `<div class="slot">
      <div class="slot-time">${s.time}</div>
      <div class="slot-name">${s.code} ${s.name}</div>
      <div class="slot-loc">${s.room}</div>
      <div class="slot-teacher">${s.teacher}</div>
    </div>`;
  }
  return `<div class="class-card ${cls}">
    <div class="class-time">${s.slot==='morning'?'上午':'下午'} ${s.time}</div>
    <div class="class-name ${cls}">${s.code} ${s.name}</div>
    <div class="class-meta">
      <span class="loc">📍 ${s.room}</span><br>
      <span class="teacher">👨‍🏫 ${s.teacher}</span>
    </div>
  </div>`;
}

// Today
const today = new Date();
const todayStr = toDateStr(today);
const todayEl = document.getElementById('today-date');
todayEl.textContent = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 周${DAY_NAMES[today.getDay()]}`;

const todayData = getScheduleForDate(todayStr);
const todayContent = document.getElementById('today-content');
if(!todayData || todayData.sessions.length === 0){
  todayContent.innerHTML = '<div class="no-class">今日无课 🎉</div>';
} else {
  todayContent.innerHTML = todayData.sessions.map(s => renderCard(s, false)).join('');
}

// Weeks tabs
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('week-panels');

// Find current week
let currentWeekIdx = 0;
WEEKS.forEach((w,i)=>{
  if(todayStr >= w.start && todayStr <= w.end) currentWeekIdx = i;
});

WEEKS.forEach((week, wi) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (wi===currentWeekIdx?' active':'');
  tab.textContent = week.label;
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.week-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+wi).classList.add('active');
  };
  tabsEl.appendChild(tab);

  // build days
  const panel = document.createElement('div');
  panel.className = 'week-panel' + (wi===currentWeekIdx?' active':'');
  panel.id = 'panel-'+wi;

  const start = new Date(week.start);
  let html = '';
  for(let d=0; d<7; d++){
    const day = new Date(start);
    day.setDate(start.getDate()+d);
    if(day.getDay()===0) continue; // skip Sunday
    const ds = toDateStr(day);
    const data = getScheduleForDate(ds);
    const isToday = ds === todayStr;
    const label = `${day.getMonth()+1}/${day.getDate()} 周${DAY_NAMES[day.getDay()]}`;
    html += `<div class="day-row">
      <div class="day-label ${isToday?'today-label':''}">${isToday?'▶ ':''}${label}${isToday?' (今天)':''}</div>`;
    if(!data || data.sessions.length===0){
      html += `<div class="empty-day">无课</div>`;
    } else {
      html += data.sessions.map(s=>renderCard(s,true)).join('');
    }
    html += `</div>`;
  }
  panel.innerHTML = html;
  panelsEl.appendChild(panel);
});

// Scroll to active tab
setTimeout(()=>{
  const activeTab = document.querySelector('.tab.active');
  if(activeTab) activeTab.scrollIntoView({inline:'center', behavior:'smooth'});
},100);
</script>
</body>
</html>
